<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder | Professional MERN Style</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Smooth scrolling for preview toggle */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold text-center text-blue-600 mb-8">Resume Builder</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg shadow-lg p-6 h-fit">
                <h2 class="text-2xl font-semibold mb-4 text-gray-800 border-b pb-2">Enter Your Details</h2>
                
                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-3 text-blue-600">Personal Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <input type="text" id="fullName" placeholder="Full Name" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                        <input type="email" id="email" placeholder="Email" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                        <input type="tel" id="phone" placeholder="Phone" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                        <input type="text" id="location" placeholder="Location (City, Country)" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                        <input type="text" id="linkedin" placeholder="LinkedIn URL" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                        <input type="text" id="github" placeholder="GitHub URL" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-3 text-blue-600">Professional Summary</h3>
                    <textarea id="summary" rows="4" placeholder="Brief summary about your expertise..." class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-3 text-blue-600 flex justify-between items-center">
                        Work Experience
                        <button onclick="ExperienceManager.add()" class="text-sm bg-blue-100 text-blue-600 px-3 py-1 rounded-md hover:bg-blue-200">+ Add</button>
                    </h3>
                    <div id="experienceContainer"></div>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-3 text-blue-600 flex justify-between items-center">
                        Education
                        <button onclick="EducationManager.add()" class="text-sm bg-blue-100 text-blue-600 px-3 py-1 rounded-md hover:bg-blue-200">+ Add</button>
                    </h3>
                    <div id="educationContainer"></div>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-3 text-blue-600">Skills</h3>
                    <textarea id="skills" rows="3" placeholder="React, Node.js, MongoDB, Express (comma separated)" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
                </div>

                <div class="mb-6">
                    <h3 class="text-lg font-semibold mb-3 text-blue-600 flex justify-between items-center">
                        Projects
                        <button onclick="ProjectManager.add()" class="text-sm bg-blue-100 text-blue-600 px-3 py-1 rounded-md hover:bg-blue-200">+ Add</button>
                    </h3>
                    <div id="projectContainer"></div>
                </div>

                <div class="flex flex-col gap-3">
                    <div class="flex gap-4">
                        <button onclick="PreviewManager.toggle()" class="flex-1 bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition font-semibold shadow-md">
                            Preview Resume
                        </button>
                        <button onclick="PDFGenerator.download()" class="flex-1 bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition font-semibold shadow-md">
                            Download PDF
                        </button>
                    </div>
                    
                    <div class="flex gap-4">
                        <button onclick="LocalStorageManager.save()" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                            Save Progress
                        </button>
                        <button onclick="LocalStorageManager.clear()" class="flex-1 bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 transition">
                            Reset Form
                        </button>
                    </div>
                </div>
                
                <p class="mt-4 text-xs text-gray-500 text-center italic">✨ All data is auto-saved locally every 30 seconds.</p>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-4 overflow-hidden">
                <h2 class="text-2xl font-semibold mb-4 text-gray-800">Live Preview</h2>
                <div id="resumePreview" class="border p-1 bg-gray-50 min-h-screen">
                    </div>
            </div>
        </div>
    </div>

    <script src="state.js"></script>
    <script src="resumeTemplate.js"></script>
    <script src="formData.js"></script>
    <script src="experienceManager.js"></script>
    <script src="educationManager.js"></script>
    <script src="projectManager.js"></script>
    <script src="localStorage.js"></script>
    <script src="previewManager.js"></script>
    <script src="pdfGenerator.js"></script>
    <script src="eventListeners.js"></script>
    <script src="apps.js"></script>
</body>
</html>
